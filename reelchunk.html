<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ReelChunk</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --dark: #1a1208;
    --accent: #e8521a;
    --accent2: #f5a623;
    --muted: #8a7f6e;
    --border: #d4cbb8;
    --chunk-color: #e8521a;
    --translation-bg: #1a1208;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--dark);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  header {
    padding: 2rem 1.5rem 1rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 2px solid var(--dark);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 0.05em;
    line-height: 1;
    color: var(--dark);
  }

  .logo span {
    color: var(--accent);
  }

  .logo-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 0.4rem;
  }

  /* API Key section */
  .api-section {
    margin: 1.25rem 1.5rem;
    padding: 1rem;
    background: var(--dark);
    border-radius: 8px;
  }

  .api-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .api-input-row {
    display: flex;
    gap: 0.5rem;
  }

  .api-input {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.6rem 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--accent2); }
  .api-input::placeholder { color: rgba(255,255,255,0.3); }

  .api-save-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    padding: 0 1rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .api-save-btn:hover { opacity: 0.85; }

  .api-status {
    font-size: 0.7rem;
    margin-top: 0.4rem;
    color: rgba(255,255,255,0.5);
  }

  .api-status.ok { color: #6af79a; }

  /* Upload area */
  .upload-section {
    margin: 0 1.5rem 1.25rem;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }

  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    background: var(--surface);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .upload-area:hover, .upload-area.drag-over {
    border-color: var(--accent);
    background: #fff9f5;
  }

  .upload-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  .upload-placeholder {
    text-align: center;
    padding: 2rem;
    pointer-events: none;
  }

  .upload-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 0.75rem;
  }

  .upload-main-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    color: var(--dark);
    margin-bottom: 0.25rem;
  }

  .upload-sub-text {
    font-size: 0.75rem;
    color: var(--muted);
  }

  #preview-container {
    display: none;
    width: 100%;
    position: relative;
  }

  #preview-img {
    width: 100%;
    display: block;
    border-radius: 10px;
    max-height: 300px;
    object-fit: contain;
    background: #000;
  }

  .preview-overlay {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    pointer-events: all;
  }

  /* Analyze button */
  .analyze-btn {
    width: calc(100% - 3rem);
    margin: 0 1.5rem 1.5rem;
    padding: 1.1rem;
    background: var(--dark);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  .analyze-btn:hover:not(:disabled) {
    background: var(--accent);
    transform: translateY(-1px);
  }

  .analyze-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .btn-icon { font-size: 1.2rem; }

  /* Loading */
  .loading {
    display: none;
    margin: 0 1.5rem 1.5rem;
    padding: 2rem;
    text-align: center;
  }

  .loading.active { display: block; }

  .loading-dots {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    margin-bottom: 0.75rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .loading-text {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* Results */
  .results {
    display: none;
    margin: 0 1.5rem 2rem;
    animation: fadeUp 0.4s ease;
  }

  .results.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Extracted text */
  .extracted-section {
    margin-bottom: 1.25rem;
  }

  .extracted-text {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--dark);
  }

  /* Chunks */
  .chunks-section {
    margin-bottom: 1.25rem;
  }

  .chunk-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .chunk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .chunk-card:nth-child(1) { animation-delay: 0.05s; }
  .chunk-card:nth-child(2) { animation-delay: 0.1s; }
  .chunk-card:nth-child(3) { animation-delay: 0.15s; }
  .chunk-card:nth-child(4) { animation-delay: 0.2s; }

  .chunk-header {
    background: var(--dark);
    padding: 0.6rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .chunk-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .chunk-phrase {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: white;
    font-weight: 500;
  }

  .chunk-body {
    padding: 0.75rem 1rem;
  }

  .chunk-meaning {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }

  .chunk-explanation {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }

  /* Translation */
  .translation-section {
    background: var(--dark);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .translation-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 0.6rem;
    font-weight: 500;
  }

  .translation-text {
    font-size: 1rem;
    color: white;
    line-height: 1.7;
    font-weight: 300;
  }

  /* Reset button */
  .reset-btn {
    width: 100%;
    padding: 0.85rem;
    background: transparent;
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .reset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Error */
  .error-box {
    display: none;
    margin: 0 1.5rem 1.5rem;
    padding: 1rem;
    background: #fff0ec;
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 0.82rem;
    color: var(--accent);
    line-height: 1.5;
  }

  .error-box.active { display: block; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-sub">Instagram Reel</div>
    <div class="logo">Reel<span>Chunk</span></div>
  </div>
  <div style="font-size:0.7rem;color:var(--muted);text-align:right;line-height:1.5;">スクショ投げるだけで<br>チャンク解説</div>
</header>

<!-- API Key -->
<div class="api-section">
  <div class="api-label">Gemini API Key</div>
  <div class="api-input-row">
    <input type="password" class="api-input" id="api-key-input" placeholder="AIza...">
    <button class="api-save-btn" onclick="saveApiKey()">SET</button>
  </div>
  <div class="api-status" id="api-status">キーを入力してください</div>
</div>

<!-- Upload -->
<div class="upload-section">
  <div class="section-label">リールのスクショ</div>
  <div class="upload-area" id="upload-area">
    <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
    <div class="upload-placeholder" id="upload-placeholder">
      <span class="upload-icon">📱</span>
      <div class="upload-main-text">タップして画像を選択</div>
      <div class="upload-sub-text">リールのスクショをここにドロップ</div>
    </div>
    <div id="preview-container">
      <img id="preview-img" alt="preview">
      <button class="preview-overlay" onclick="clearImage(event)">✕</button>
    </div>
  </div>
</div>

<!-- Analyze Button -->
<button class="analyze-btn" id="analyze-btn" onclick="analyze()" disabled>
  <span class="btn-icon">⚡</span> 解析する
</button>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="loading-text">英文を解析中...</div>
</div>

<!-- Error -->
<div class="error-box" id="error-box"></div>

<!-- Results -->
<div class="results" id="results">
  <div class="extracted-section">
    <div class="section-label">抽出された英文</div>
    <div class="extracted-text" id="extracted-text"></div>
  </div>

  <div class="chunks-section">
    <div class="section-label">チャンク解説</div>
    <div class="chunk-list" id="chunk-list"></div>
  </div>

  <div class="translation-section">
    <div class="translation-label">全体の意味</div>
    <div class="translation-text" id="translation-text"></div>
  </div>

  <button class="reset-btn" onclick="resetAll()">別のスクショを解析する</button>
</div>

<script>
  let apiKey = localStorage.getItem('gemini_api_key') || '';
  let imageBase64 = null;
  let imageMimeType = null;

  // Init
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('api-status').textContent = '✓ APIキー設定済み';
    document.getElementById('api-status').classList.add('ok');
  }

  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) return;
    apiKey = val;
    localStorage.setItem('gemini_api_key', val);
    document.getElementById('api-status').textContent = '✓ APIキー設定済み';
    document.getElementById('api-status').classList.add('ok');
    updateAnalyzeBtn();
  }

  function updateAnalyzeBtn() {
    const btn = document.getElementById('analyze-btn');
    btn.disabled = !(apiKey && imageBase64);
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    loadImage(file);
  }

  function loadImage(file) {
    imageMimeType = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = (e) => {
      const result = e.target.result;
      imageBase64 = result.split(',')[1];
      document.getElementById('preview-img').src = result;
      document.getElementById('preview-container').style.display = 'block';
      document.getElementById('upload-placeholder').style.display = 'none';
      updateAnalyzeBtn();
    };
    reader.readAsDataURL(file);
  }

  function clearImage(e) {
    e.stopPropagation();
    e.preventDefault();
    imageBase64 = null;
    imageMimeType = null;
    document.getElementById('preview-img').src = '';
    document.getElementById('preview-container').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
    document.getElementById('file-input').value = '';
    updateAnalyzeBtn();
  }

  // Drag and drop
  const uploadArea = document.getElementById('upload-area');
  uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImage(file);
  });

  async function analyze() {
    if (!apiKey || !imageBase64) return;

    document.getElementById('analyze-btn').disabled = true;
    document.getElementById('loading').classList.add('active');
    document.getElementById('results').classList.remove('active');
    document.getElementById('error-box').classList.remove('active');

    const prompt = `この画像はInstagramリールのスクリーンショットです。

以下の手順で分析してください：

1. 画像内の英文テキスト（テロップ・字幕・キャプション）を全て抽出する
2. その英文からよく使われる重要なチャンク（フレーズ・コロケーション・イディオム）を2〜4個抽出する
3. 文全体の自然な日本語訳を作る

必ず以下のJSON形式のみで返答してください（他のテキスト不要）：

{
  "extracted": "抽出した英文をそのまま",
  "chunks": [
    {
      "phrase": "チャンクのフレーズ",
      "meaning": "日本語の意味",
      "explanation": "どんな場面で使うか、なぜこれが重要かの簡単な説明（1〜2文）"
    }
  ],
  "translation": "文全体の自然な日本語訳"
}

英文が見つからない場合は extracted を "英文が見つかりませんでした" にしてください。`;

    try {
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [
                {
                  inline_data: {
                    mime_type: imageMimeType,
                    data: imageBase64
                  }
                },
                { text: prompt }
              ]
            }],
            generationConfig: {
              temperature: 0.3,
              maxOutputTokens: 1024
            }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `HTTP ${response.status}`);
      }

      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

      // Parse JSON
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderResults(parsed);

    } catch (err) {
      showError(err.message);
    } finally {
      document.getElementById('loading').classList.remove('active');
      document.getElementById('analyze-btn').disabled = false;
      updateAnalyzeBtn();
    }
  }

  function renderResults(data) {
    // Extracted text
    document.getElementById('extracted-text').textContent = data.extracted || '—';

    // Chunks
    const chunkList = document.getElementById('chunk-list');
    chunkList.innerHTML = '';
    if (data.chunks && data.chunks.length > 0) {
      data.chunks.forEach((chunk, i) => {
        const card = document.createElement('div');
        card.className = 'chunk-card';
        card.innerHTML = `
          <div class="chunk-header">
            <span class="chunk-number">CHUNK ${String(i + 1).padStart(2, '0')}</span>
            <span class="chunk-phrase">${escapeHtml(chunk.phrase)}</span>
          </div>
          <div class="chunk-body">
            <div class="chunk-meaning">${escapeHtml(chunk.meaning)}</div>
            <div class="chunk-explanation">${escapeHtml(chunk.explanation)}</div>
          </div>
        `;
        chunkList.appendChild(card);
      });
    } else {
      chunkList.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">チャンクが見つかりませんでした</div>';
    }

    // Translation
    document.getElementById('translation-text').textContent = data.translation || '—';

    document.getElementById('results').classList.add('active');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function showError(message) {
    const box = document.getElementById('error-box');
    box.textContent = `エラー: ${message}`;
    box.classList.add('active');
  }

  function resetAll() {
    clearImage({ stopPropagation: () => {}, preventDefault: () => {} });
    document.getElementById('results').classList.remove('active');
    document.getElementById('error-box').classList.remove('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
